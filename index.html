<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dialogue UI Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #1b1f27;
      --panel-2: #252b35;
      --text: #eef1f5;
      --muted: #a8b0bd;
      --line: #343b48;
      --accent: #7bd88f;
      --accent-2: #f2bf5e;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, rgba(123, 216, 143, .12), transparent 36%),
        linear-gradient(315deg, rgba(242, 191, 94, .10), transparent 34%),
        var(--bg);
      color: var(--text);
    }

    button, input, select {
      font: inherit;
      color: inherit;
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 6px;
    }

    button {
      min-height: 40px;
      padding: 0 14px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    input, select { min-height: 36px; padding: 0 10px; }

    .app {
      width: min(760px, calc(100vw - 28px));
      display: grid;
      gap: 12px;
    }

    .dialogue {
      min-height: 320px;
      display: grid;
      align-content: end;
      gap: 18px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 31, 39, .92);
      box-shadow: 0 24px 60px rgba(0, 0, 0, .28);
    }

    .speaker {
      color: var(--accent-2);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .text {
      min-height: 92px;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.24;
    }

    .choices {
      display: grid;
      gap: 10px;
    }
    .choices button {
      width: 100%;
      min-height: 48px;
      text-align: left;
      background: #202630;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .debug-toggle {
      position: fixed;
      right: 16px;
      top: 16px;
      width: 42px;
      padding: 0;
    }

    .debug {
      display: none;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 31, 39, .96);
    }
    .debug.open { display: grid; }
    .debug-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      align-items: center;
    }
    .debug label {
      color: var(--muted);
      font-size: 13px;
    }
    .jump {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    pre {
      margin: 0;
      max-height: 180px;
      overflow: auto;
      color: var(--muted);
      white-space: pre-wrap;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <button class="debug-toggle" id="debugToggle" title="Debug">⚙</button>

  <main class="app">
    <section class="dialogue" aria-live="polite">
      <div>
        <div class="speaker" id="speaker"></div>
        <div class="text" id="text"></div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="actions" id="actions"></div>
    </section>

    <section class="debug" id="debug">
      <div class="debug-row">
        <label for="lang">Language</label>
        <select id="lang"></select>
      </div>
      <div class="debug-row">
        <label for="jumpId">Jump</label>
        <div class="jump">
          <input id="jumpId" placeholder="node id">
          <button id="jumpBtn">Go</button>
        </div>
      </div>
      <button id="reloadBtn">Reload CSV</button>
      <pre id="stateView"></pre>
    </section>
  </main>

  <script src="dialogue-engine.js"></script>
  <script>
    const el = id => document.getElementById(id);
    const ui = {
      speaker:   el("speaker"),
      text:      el("text"),
      choices:   el("choices"),
      actions:   el("actions"),
      debug:     el("debug"),
      lang:      el("lang"),
      jumpId:    el("jumpId"),
      stateView: el("stateView"),
    };

    function addAction(label, onClick) {
      const btn = document.createElement("button");
      btn.textContent = label;
      btn.onclick = onClick;
      ui.actions.append(btn);
    }

    function showError(msg) {
      ui.speaker.textContent = "Error";
      ui.text.textContent    = msg;
      ui.choices.innerHTML   = "";
      ui.actions.innerHTML   = "";
    }

    DialogueEngine.onLoad = ({ languages, state }) => {
      ui.lang.innerHTML = "";
      languages.forEach(lang =>
        ui.lang.append(new Option(lang, lang, lang === state.lang, lang === state.lang))
      );
    };

    DialogueEngine.onRender = (node, { t, enter, choose, choices, state }) => {
      ui.speaker.textContent = t(node.speakerKey);
      ui.text.textContent    = t(node.textKey);
      ui.choices.innerHTML   = "";
      ui.actions.innerHTML   = "";

      if (node.type === "choice") {
        choices(node.id).forEach(c => {
          const btn = document.createElement("button");
          btn.textContent = t(c.textKey);
          btn.onclick = () => choose(c);
          ui.choices.append(btn);
        });
      } else if (node.type === "line") {
        addAction(t("ui_next"), () => enter(node.next));
      } else if (node.type === "end") {
        addAction(t("ui_restart"), () => enter("start"));
      }

      ui.stateView.textContent = JSON.stringify(state, null, 2);
    };

    DialogueEngine.onError = showError;

    el("debugToggle").onclick = () => ui.debug.classList.toggle("open");
    el("reloadBtn").onclick   = () => DialogueEngine.load().catch(e => showError(e.message));
    el("jumpBtn").onclick     = () => DialogueEngine.jumpToNode(ui.jumpId.value.trim());
    ui.lang.onchange          = () => DialogueEngine.setLanguage(ui.lang.value);

    DialogueEngine.load().catch(e => showError(e.message));
  </script>
</body>
</html>
