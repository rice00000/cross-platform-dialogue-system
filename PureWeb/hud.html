<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dialogue HUD</title>
  <style>
    /*
     * CSS 自定义属性（变量），统一定义在 :root 上表示"全局可用"。
     * 写法：--名字: 值。使用时：var(--名字)。
     * 好处：想改 HUD 高度只需改这一处，所有用到 --hud-h 的地方自动更新。
     * :root 是整个文档的根元素，在这里定义变量相当于"全局配置面板"。
     */
    :root {
      --hud-h: 200px;     /* bar height - tweak to match game res */
      --hud-bg: rgba(6, 8, 14, 0.60);
      --gold:   #f2bf5e;
      --text:   #eef1f5;
      --muted:  #9aa3b2;
      --green:  #7bd88f;
      --line:   rgba(255, 255, 255, 0.10);
      font-family: "Source Han Sans CN", "Noto Sans CJK SC", Inter, ui-sans-serif, sans-serif;
    }

    /*
     * 通用重置。浏览器对很多元素有内置 margin/padding（h1 有上下间距，ul 有缩进等）。
     * 全部清零后，所有间距都由我们自己控制，不会因浏览器差异出现意外空白。
     *
     * box-sizing: border-box 改变"宽度的算法"：
     *   默认（content-box）：width 只算内容，padding 和 border 会额外增加元素实际占位
     *   border-box：width 包含 padding 和 border，设 width: 100px 就是实际占 100px
     *
     * *::before 和 *::after 是"伪元素"选择器，也要一起重置否则会有遗漏。
     */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      /* UE 透明依赖页面根层不绘制背景；只让 HUD 自己画半透明底色。 */
      background: transparent;
      color: var(--text);
      overflow: hidden;                 /* 禁止出现页面滚动条；HUD 内容全用 fixed 定位，不撑开文档 */
    }

    /*
     * ── 鼠标事件穿透逻辑
     *
     * 正常情况下每个元素都会拦截鼠标事件（点击/hover 都不会穿透到下面）。
     * 把 body 设为 pointer-events: none，意思是整个 HTML 层"透明"——
     * 鼠标事件会穿过去，到达底下运行的游戏画面。
     *
     * 但 HUD 上有按钮需要被点击，所以每个需要响应鼠标的元素要显式写
     * pointer-events: auto 来"重新开启"自己。注意这个属性不会自动继承：
     * 父元素设了 none，子元素要自己声明 auto 才有效。
     */
    body { pointer-events: none; }

    /*
     * ── 立绘（角色图片）
     *
     * position: fixed 让元素脱离正常文档流，相对于"视口"（屏幕可见区域）定位，
     * 而不是相对于任何父元素。这样它永远钉在屏幕上，不受其他布局影响。
     *
     * right/bottom 指定元素右边/底边距视口边缘的距离。
     * bottom 用 calc() 计算：HUD 高度减去 48px，让立绘底部刚好从 HUD 顶边向上
     * 48px 处开始，视觉上立绘从 HUD 内部"冒出来"而不是悬空在 HUD 上方。
     *
     * object-fit: contain     保持图片原始比例缩放，不裁剪
     * object-position: bottom center  图片没填满容器时，脚部贴底对齐（保证脚踩在 HUD 上）
     */
    #portrait {
      position: fixed;
      right: 52px;
      bottom: calc(var(--hud-h) - 48px);
      max-height: 360px;
      max-width: 280px;
      object-fit: contain;
      object-position: bottom center;
      /*
       * transition 让指定 CSS 属性在值变化时平滑过渡，不是瞬间跳变。
       * 'opacity 0.15s' 表示：opacity 属性的变化会在 0.15 秒内动画完成。
       * 当 JavaScript 给元素加上 .visible 类（opacity 从 0 变 1），浏览器自动淡入。
       * 移除 .visible 类时，自动淡出。不需要写任何 JS 动画代码。
       */
      transition: opacity 0.15s;
      z-index: 101;       /* 层级规划见下方 z-index 注释区块 */
      pointer-events: none;   /* 立绘只是装饰，不拦截鼠标事件 */
      opacity: 0;             /* 默认隐藏，JavaScript 通过 .visible 类来控制显示 */
    }

    /*
     * 复合选择器：#portrait.visible 只匹配同时满足 id=portrait 且带 class=visible 的元素。
     * 单写 .visible 会匹配页面里所有带这个类的元素，加上 #portrait 前缀就精确锁定了。
     * JavaScript 通过 img.classList.add("visible") 触发这条规则，使立绘淡入显示。
     */
    #portrait.visible { opacity: 1; }

    /*
     * ── z-index 层级规划 ───────────
     *
     * z-index 控制元素在 Z 轴（垂直屏幕方向）的堆叠顺序，数字大的在上面。
     * 注意：z-index 只对 position 不是默认 static 的元素有效（fixed/absolute/relative 都可以）。
     *
     * 本项目层级（从底到顶）：
     *   游戏画面（Unreal 的 WebView 底层，在 HTML 之外）
     *   #choices    z-index: 100  选项按钮区，浮于 HUD 正上方
     *   #hud        z-index: 100  HUD 底栏
     *   #portrait   z-index: 101  立绘，需要盖在 HUD 上（高出 1）
     *   debug panel z-index: 200  调试面板，最顶层，见 dev-debug.js
     */

    /* choice buttons (float above HUD) */
    /*
     * 选项区整体 fixed 定位，悬浮在 HUD 正上方（bottom = HUD 高度 + 14px 间距）。
     * display: flex + flex-direction: column 让子元素（各选项按钮）垂直排列成一列。
     * gap: 8px 是 flex/grid 专属的子元素间距，不需要给每个按钮加 margin-bottom。
     */
    #choices {
      position: fixed;
      bottom: calc(var(--hud-h) + 14px);
      left: 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: auto;   /* 按钮需要接收点击，在 body: none 的基础上重新开启 */
      z-index: 100;
    }

    .choice-btn {
      padding: 9px 22px;
      min-width: 220px;       /* 短选项也保持最小宽度，视觉上整齐一致 */
      text-align: left;       /* button 默认文字居中，这里改左对齐更像对话选项 */
      /*
       * font: inherit 是 form 元素（button/input/select）的必写项。
       * 浏览器默认不让这些控件继承页面字体，必须显式声明 inherit，
       * 才会使用 :root 里设置的 font-family。
       */
      font: inherit;
      font-size: 15px;
      color: var(--text);
      background: rgba(10, 12, 20, 0.80);
      border: 1px solid var(--line);
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.10s, background 0.10s;
    }
    .choice-btn:hover {
      border-color: var(--green);
      background: rgba(123, 216, 143, 0.10);
    }

    /*
     * ── HUD 底栏 ───────────────────
     *
     * position: fixed + inset: auto 0 0 0 将元素钉在屏幕底部并贴满左右。
     * inset 是 top/right/bottom/left 的简写，顺序同 margin/padding。
     * auto 0 0 0 = top: auto（不约束顶部）; right: 0; bottom: 0; left: 0。
     *
     * display: grid 把 HUD 分成左右两列：
     *   1fr    = "剩余空间的一份"——所有 320px 之外的宽度都给左列
     *   320px  = 右列固定 320px，视觉上为立绘图片预留位置
     *
     * 立绘本身是独立的 fixed 定位元素，不在这个 grid 里——右列只是视觉占位，
     * 防止左侧文字延伸到立绘背后造成重叠，让文字内容区自然收在左边。
     */
    #hud {
      position: fixed;
      inset: auto 0 0 0;
      height: var(--hud-h);
      display: grid;
      /* right column reserves space for portrait — text won't overlap */
      grid-template-columns: 1fr 320px;
      background: var(--hud-bg);
      border-top: 1px solid var(--line);
      pointer-events: auto;   /* HUD 整体需要接收点击（按钮在里面），重新开启 */
      z-index: 100;
    }

    /*
     * HUD 左列的内嵌 grid，分为三行：
     *   grid-template-rows: 40px 1fr 44px
     *   第一行：固定 40px 给说话人名字
     *   第二行：1fr = 剩余高度全给对话正文（自动拉伸）
     *   第三行：固定 44px 给操作按钮和语言选择
     *
     * min-height: 0 是 CSS grid 的一个反直觉细节：
     *   grid 子元素默认 min-height: auto，意味着它不会缩小到低于自身内容高度。
     *   不写这行，1fr 那行会被文字撑开，#text 的 overflow-y: auto 永远不会触发。
     *   加上之后，grid 可以把这一行压缩到分配的空间内，文字溢出才能出现滚动条。
     */
    .hud-left {
      display: grid;
      grid-template-rows: 40px 1fr 44px;
      padding: 12px 20px 10px 28px;
      gap: 4px;
      min-height: 0;
    }

    /*
     * align-self 控制元素在所在 grid 行（或 flex 行）内的垂直对齐方式。
     * grid 行默认 stretch（子元素拉伸填满整行高度），会让名字背景也被拉高。
     * align-self: center 让 #speaker 在 40px 行内垂直居中，视觉上更自然，
     * 也不需要再套一层 div 用 flexbox 来居中。
     */
    #speaker {
      align-self: center;
      padding: 0 14px;
      border-left: 3px solid var(--gold);   /* 名字左边的金色竖线，视觉上像徽章 */
      color: var(--gold);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
    }

    /*
     * clamp(最小值, 首选值, 最大值) 实现响应式字号：
     *   1.7vw = 视口宽度的 1.7%，随窗口变大变小
     *   不小于 15px（小窗口保底可读）
     *   不超过 20px（大屏不会太大）
     *
     * overflow-y: auto 在文字超出元素高度时出现滚动条（替代之前的 line-clamp 截断）。
     * 搭配 .hud-left 的 min-height: 0 才能真正触发——见上方注释。
     */
    #text {
      font-size: clamp(15px, 1.7vw, 20px);
      line-height: 1.6;
      overflow-y: auto;
      min-height: 0;    /* 同 .hud-left，允许 grid 把这一行压缩到分配的高度 */
    }

    /* bottom row: action btn + lang (margin-left:auto on #lang acts as spacer) */
    #controls {
      display: flex;
      align-items: center;    /* flex 中子元素默认 stretch（拉高），这里改为垂直居中 */
      gap: 10px;
    }

    #action-btn {
      height: 30px;
      padding: 0 18px;
      font: inherit;          /* form 元素继承字体，同 .choice-btn 的说明 */
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
      background: rgba(123, 216, 143, 0.08);
      border: 1px solid rgba(123, 216, 143, 0.30);
      border-radius: 3px;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.10s;
    }
    #action-btn:hover { background: rgba(123, 216, 143, 0.16); }
    /*
     * :empty 伪类：仅当元素没有任何子节点（包括文本）时才匹配。
     * JavaScript 把 actionBtn.textContent 清空后，按钮自动隐藏，
     * 不需要在 JS 里手动写 .style.display = 'none'，逻辑更干净。
     */
    #action-btn:empty { display: none; }

    #lang {
      height: 30px;
      padding: 0 8px;
      /*
       * margin-left: auto 在 flex 容器内是一个经典布局技巧：
       * flex 布局把"剩余空间"分配给 auto margin，使这个元素被推到最右端。
       * 效果相当于在按钮和语言选择之间放一个弹性间隔，
       * 比专门加一个空 div 作分隔更简洁。
       */
      margin-left: auto;
      font: inherit;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      border-radius: 3px;
      cursor: pointer;
      pointer-events: auto;
    }

    /*
     * HUD 右列是空 div（无内容）。存在的原因：
     * #hud 整体有 pointer-events: auto，默认整条底栏都会拦截鼠标。
     * 把右列设为 none，立绘区域的点击可以穿过 HUD 到达游戏，不会被 HUD 吃掉。
     */
    .hud-right { pointer-events: none; }

    .err { color: #ff6b6b; font-size: 14px; }
  </style>
</head>
<body>

  <!-- choices 浮在 HUD 条上方，JavaScript 动态往里插入 <button> -->
  <div id="choices"></div>

  <!-- HUD 底栏：两列 grid，左列是主内容，右列给立绘留位 -->
  <div id="hud">
    <div class="hud-left">
      <div id="speaker"></div>  <!-- 说话人名字，由 JS 写入 textContent -->
      <div id="text"></div>     <!-- 对话正文，可滚动 -->
      <div id="controls">
        <button id="action-btn"></button>   <!-- 下一句 / 重新开始，内容和 onclick 由 JS 设定 -->
        <select id="lang"></select>         <!-- 语言下拉，选项由 JS 动态填充 -->
      </div>
    </div>
    <div class="hud-right"></div>   <!-- 空列，pointer-events:none，让立绘区点击穿透 -->
  </div>

  <!-- 立绘图片，fixed 定位悬浮在 HUD 上方；src 和 .visible 由 JS 控制 -->
  <img id="portrait" alt="">

  <script src="dialogue-engine.js"></script>
  <script>
    /*
     * 简写工具：$ 是自定义缩写，等同于 document.getElementById。
     * 箭头函数语法：const f = x => expr 等同于 function f(x)c { return expr; }
     * 后面 $("speaker") 比 document.getElementById("speaker") 简洁很多。
     */

    const getEle = id => document.getElementById(id); //有点像lambda

    /*
     * 把所有需要反复读写的 DOM 元素缓存到一个对象里。
     * 每次查 DOM 都有开销，缓存后直接用 ui.text、ui.speaker 等引用，
     * 写法清晰且避免重复查询。
     */
    const ui = {
      speaker:   getEle("speaker"),
      text:      getEle("text"),
      choices:   getEle("choices"),
      actionBtn: getEle("action-btn"),
      lang:      getEle("lang"),
      portrait:  getEle("portrait"),
    };

    /*
     * _lastPortrait 记住上一次显示的立绘路径（模块内私有变量）。
     * 同一角色连续说话时，portrait 路径不变，跳过不必要的 DOM 操作和图片重新加载。
     */
    let _lastPortrait = "";
    function setPortrait(path) {
      if (path === _lastPortrait) return;   // 路径没变则跳过
      _lastPortrait = path;
      const img = ui.portrait;
      if (!path) {
        // 路径为空 → 隐藏立绘：移除 .visible 类，CSS transition 自动执行淡出动画
        img.classList.remove("visible");
        return;
      }
      img.src = path;                   // 设置 src，浏览器开始加载图片
      img.classList.add("visible");     // 加 .visible，CSS transition 触发淡入
    }

    /*
     * 引擎报错时切换 HUD 到错误状态。
     * innerHTML 可以设置含 HTML 标签的内容（这里用 <span class="err"> 添加红色样式）。
     * textContent 只能设置纯文本，不解析标签——安全的地方优先用 textContent，
     * 需要嵌入结构时才用 innerHTML（注意不能让用户输入的内容直接进 innerHTML，
     * 否则有 XSS 安全风险——这里 msg 来自引擎内部，是安全的）。
     */
    function showErr(msg) {
      ui.speaker.textContent   = "Error";
      ui.text.innerHTML        = `<span class="err">${msg}</span>`;
      ui.choices.innerHTML     = "";
      ui.actionBtn.textContent = "";
    }

    /*
     * ── DialogueEngine 回调接口 ────
     *
     * 这里用的是"回调（callback）"模式：
     *   我们不主动调用这些函数，而是把函数赋值给引擎的属性。
     *   引擎在特定时机（数据加载完成、节点切换、发生错误等）会自动调用它们。
     *   类似于 HTML 里的 onclick="..."，只是这里赋的是函数体而不是字符串。
     *
     * 每个回调接收的参数由引擎决定，我们在函数里声明需要哪些参数来接收。
     */

    /*
     * 引擎加载完数据后调用一次（每次 loadData 都会触发）。
     * 参数是 ctx 对象，这里用解构赋值只取需要的两个字段：languages 和 state。
     * { languages, state } 等同于 const languages = ctx.languages; const state = ctx.state;
     *
     * new Option(text, value, defaultSelected, selected) 是创建 <option> 元素的构造函数，
     * 等同于 <option value="zh" selected>zh</option>。
     */
    DialogueEngine.onLoad = ({ languages, state }) => {
      ui.lang.innerHTML = "";   // 清空旧选项，避免重复加载时选项叠加
      languages.forEach(lang =>
        ui.lang.append(new Option(lang, lang, lang === state.lang, lang === state.lang))
      );
    };

    /*
     * 每次节点切换时调用（包括初次进入、点击 Next、选了选项之后）。
     *
     * 参数一：node — 当前节点的原始数据行（来自 nodes.csv），包含：
     *   .type      → "line"（普通对白）/ "choice"（选择分支）/ "end"（对话结束）
     *   .speakerKey → 说话人的 loc 键，用 t() 翻译成显示文字
     *   .textKey    → 对话内容的 loc 键
     *   .portrait   → 立绘图片路径（可为空）
     *
     * 参数二：ctx 上下文对象，解构取出四个工具函数：
     *   t(key)          → 翻译函数，传 loc 键，返回当前语言对应的文本
     *   enter(id)       → 跳转到指定 id 的节点（推动引擎向前走）
     *   choose(c)       → 确认一个选项（记录效果变量、触发事件、跳转下一节点）
     *   choices(nodeId) → 返回该节点的可用选项数组（已过滤掉 condition 不满足的选项）
     */
    DialogueEngine.onNodeChange = (node, { t, enter, choose, choices }) => {
      console.log("__DIALOGUE_NODE__" + JSON.stringify(node)); // Unreal 桥接协议，格式固定

      ui.speaker.textContent   = t(node.speakerKey);   // 翻译并显示说话人名字
      ui.text.textContent      = t(node.textKey);      // 翻译并显示对话正文
      ui.choices.innerHTML     = "";                   // 清空上一帧的选项按钮
      ui.actionBtn.textContent = "";                   // 清空按钮文字（:empty 规则会自动隐藏）

      setPortrait(node.portrait);

      if (node.type === "choice") {
        /*
         * choices(node.id) 返回数组，forEach 遍历每个选项行 c。
         * 对每个 c，在内存中创建一个 <button> 元素，设好文字和点击事件，
         * 最后 append 到 #choices div 里使其出现在页面上。
         *
         * btn.onclick = () => choose(c) 用箭头函数捕获了当前的 c（闭包）：
         * 每个按钮记住自己对应的 c，点击时调用 choose(c) 告诉引擎选了哪个选项。
         */
        choices(node.id).forEach(c => {
          const btn = document.createElement("button");
          btn.className   = "choice-btn";
          btn.textContent = t(c.textKey);
          btn.onclick = () => choose(c);
          ui.choices.append(btn);
        });
      } else if (node.type === "line") {  
        // 普通对白：按钮显示"下一句"，点击后进入 node.next 节点
        ui.actionBtn.textContent = t("ui_next");
        ui.actionBtn.onclick = () => enter(node.next);
      } else if (node.type === "end") {
        // 对话结束：按钮显示"重新开始"，进入名为 "start" 的起始节点
        ui.actionBtn.textContent = t("ui_restart");
        ui.actionBtn.onclick = () => enter("start");
      }
    };

    /*
     * 节点或选项的 event 字段非空时调用。
     * __DIALOGUE_EVENT__ 是 Unreal 桥接协议的固定前缀，C++ 那侧会捕获这条 console.log。
     */
    DialogueEngine.onEvent = (name, source) => {
      console.log("__DIALOGUE_EVENT__" + JSON.stringify({ name, source }));
    };

    /*
     * 节点的 condition 字段求值为 false 时调用。
     * 引擎阻止前进，HUD 保持当前显示内容不变（所以这里什么都不用做）。
     */
    DialogueEngine.onBlocked = (condition, node) => {
      console.log("__DIALOGUE_BLOCKED__" + JSON.stringify({ condition, nodeId: node?.id }));
      // HUD stays unchanged — current node remains displayed
    };

    // 引擎内部报错（如找不到节点）时调用
    DialogueEngine.onError = msg => { showErr(msg); };

    /*
     * <select> 的 onchange 事件在用户切换下拉选项时触发。
     * 通知引擎切换语言，引擎会重新调用 onNodeChange（同一节点、新语言文本）。
     */
    ui.lang.onchange = () => DialogueEngine.setLanguage(ui.lang.value);

    /*
     * ── 按需加载开发 / 预览脚本 ───
     *
     * location.search 是 URL 里 ? 之后的部分，如 "?preview&debug"。
     * URLSearchParams 把它解析成键值对，.has("debug") 判断 "debug" 是否存在。
     */
    const params = new URLSearchParams(location.search);

    /*
     * loadScript 动态创建 <script> 标签并插入 <head>，等效于 HTML 里静态写一个 <script src>，
     * 区别是在运行时才决定要不要加载。
     *
     * 返回一个 Promise（"承诺"对象）：
     *   Promise 表示"一个异步操作的未来结果"。
     *   new Promise((resolve, reject) => {...}) 里：
     *     调用 resolve() 表示成功，调用 reject() 表示失败。
     *   外部用 await 来等待这个 Promise 完成后再继续执行。
     */
    const loadScript = src => new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = src;
      s.onload = resolve;   // 脚本加载并执行完成 → resolve，await 处继续往下走
      s.onerror = reject;   // 脚本加载失败 → reject，await 处抛出错误
      document.head.append(s);
    });

    /*
     * (async () => { ... })() 是"立即执行的异步匿名函数"。
     *
     * 为什么需要这个写法：
     *   await 只能在 async 函数内部用，但 <script> 顶层代码不是 async 函数。
     *   这个写法创建了一个 async 函数并立刻调用它，让顶层代码也能用 await。
     *
     * 加载顺序至关重要（都用 await 来保证先后顺序）：
     *   1. dev-debug.js 先加载 → 它会包裹引擎的回调，注入调试逻辑
     *   2. dialogue-web.js 后加载 → 它也包裹回调，注入立绘路径和音频，必须在 debug 之后
     *   3. DIALOGUE_READY 最后打印 → Unreal 收到这个信号才会调用 loadData 传入 CSV 数据
     *
     * 如果顺序反了：debug 包的是 preview 之前的原始回调，会漏掉 preview 注入的立绘逻辑。
     */
    (async () => {
      // ?debug 时加载调试面板脚本（仅开发用，Unreal 生产构建不传这个参数）
      if (params.has("debug")) {
        try { await loadScript(`dev-debug.js?v=${Date.now()}`); }
        catch { console.error("dev-debug.js failed to load"); }
      }
      // ?preview 时加载 Web 预览桥（注入立绘路径 + 音频播放，从 presentation.csv 读取）
      if (params.has("preview")) {
        try { await loadScript(`web_only_dialogue_bridge/dialogue-web.js?v=${Date.now()}`); }
        catch { showErr("Failed to load web preview bridge"); }
      }

      // 重要
      console.log("DIALOGUE_READY"); // trigger for the game that UI is ready to receive data
    })();
  </script>
</body>
</html>
